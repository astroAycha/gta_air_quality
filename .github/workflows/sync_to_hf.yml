name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Build a clean directory with only the files HF Spaces needs
          mkdir /tmp/hf_deploy
          cp app.py storage.py map_builder.py data_download.py fetcher.py requirements.txt README_HF.md /tmp/hf_deploy/

          cd /tmp/hf_deploy
          mv README_HF.md README.md

          git init
          git branch -m main
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "deploy from GitHub Actions"
          git push --force https://astroAycha:$HF_TOKEN@huggingface.co/spaces/astroAycha/gta-air-quality main
