name: Hourly PM2.5 Fetch

on:
  schedule:
    - cron: '0 * * * *'   # top of every hour, UTC
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-fetcher.txt

      - name: Run fetcher
        env:
          OPENAQ_API_KEY:          ${{ secrets.OPENAQ_API_KEY }}
          S3_BUCKET:               ${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID:       ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:   ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:              ${{ secrets.AWS_REGION }}
          CENTER_LAT:              ${{ vars.CENTER_LAT }}
          CENTER_LON:              ${{ vars.CENTER_LON }}
          SEARCH_RADIUS:           ${{ vars.SEARCH_RADIUS }}
        run: python fetcher.py
